name: Firebase Rules Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rules:
    runs-on: ubuntu-latest
    env:
      FIREBASE_DATABASE_NAMESPACE: loci-flow-default-rtdb
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run Firebase RTDB rules emulator tests
        run: npx --yes firebase-tools@latest emulators:exec --project loci-flow --only auth,database "node web/tests/firebase-rules-user-isolation.test.mjs"
