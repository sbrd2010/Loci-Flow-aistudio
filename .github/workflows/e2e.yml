name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # E2E runs in demo mode and should not require repository secrets.
      # Production deploy still requires the real VITE_FIREBASE_APP_ID.
      VITE_FIREBASE_APP_ID: "1:862993748883:web:0000000000000000"
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (with system deps)
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Start preview server in background
        run: npm run preview &

      - name: Wait for preview server to be ready
        run: |
          echo "Waiting for http://localhost:4173..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4173 > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Preview server did not start in time" && exit 1

      - name: Run E2E smoke tests
        run: npm run test:e2e
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
