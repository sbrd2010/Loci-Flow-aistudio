name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install, test, and build web
        working-directory: web
        env:
          VITE_GROQ_KEY: ${{ secrets.VITE_GROQ_KEY }}
          VITE_NVIDIA_KEY: ${{ secrets.VITE_NVIDIA_KEY }}
          VITE_GEMINI_KEY: ${{ secrets.VITE_GEMINI_KEY }}
          VITE_CEREBRAS_KEY: ${{ secrets.VITE_CEREBRAS_KEY }}
          VITE_ZAI_KEY: ${{ secrets.VITE_ZAI_KEY }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        run: |
          npm ci
          npm test
          npm run build

      - name: Validate deploy script syntax
        run: node --check scripts/deploy-firebase-rest.mjs

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LOCI_FLOW }}
          create_credentials_file: true
          export_environment_variables: true

      # firebase-tools fails to authenticate with this service account across
      # both major versions tested (14.x and 15.x), with no further
      # diagnostic detail, even though gcloud/ADC auth against the same
      # credentials succeeds and the resulting access token is accepted by
      # both the Firebase Management API and the Firebase Hosting API
      # (confirmed via direct REST calls in CI). We deploy via those REST
      # APIs directly, authenticated with the same access token, instead of
      # going through firebase-tools.
      - name: Deploy Firebase database rules and hosting
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          export FIREBASE_ACCESS_TOKEN="$(gcloud auth print-access-token)"
          node scripts/deploy-firebase-rest.mjs
