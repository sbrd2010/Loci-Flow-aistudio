name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install, test, and build web
        working-directory: web
        env:
          VITE_GROQ_KEY: ${{ secrets.VITE_GROQ_KEY }}
          VITE_NVIDIA_KEY: ${{ secrets.VITE_NVIDIA_KEY }}
          VITE_GEMINI_KEY: ${{ secrets.VITE_GEMINI_KEY }}
          VITE_CEREBRAS_KEY: ${{ secrets.VITE_CEREBRAS_KEY }}
          VITE_ZAI_KEY: ${{ secrets.VITE_ZAI_KEY }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        run: |
          npm ci
          npm test
          npm run build

      - name: Write Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_LOCI_FLOW: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LOCI_FLOW }}
        run: |
          umask 077
          test -n "$FIREBASE_SERVICE_ACCOUNT_LOCI_FLOW"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_LOCI_FLOW" > "$RUNNER_TEMP/firebase-service-account.json"
          jq -e '
            .type == "service_account" and
            .project_id == "loci-flow" and
            (.private_key | type == "string" and length > 0) and
            (.client_email | type == "string" and length > 0)
          ' "$RUNNER_TEMP/firebase-service-account.json" > /dev/null

      - name: Diagnose service account auth
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          set -euo pipefail
          jq -r '.private_key' "$GOOGLE_APPLICATION_CREDENTIALS" | openssl pkey -noout -check \
            && echo "PEM parses OK as a private key" \
            || echo "PEM FAILED to parse as a private key"
          gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"
          gcloud auth list
          gcloud config set project loci-flow
          if ! gcloud auth print-access-token > /dev/null; then
            echo "Token retrieval FAILED"
            exit 1
          fi
          echo "Token obtained OK"
          if ! gcloud auth application-default print-access-token > /dev/null; then
            echo "ADC token retrieval FAILED"
            exit 1
          fi
          echo "ADC token obtained OK"
          if ! npx --yes firebase-tools@15.22.1 projects:list --non-interactive > /dev/null; then
            echo "firebase-tools could not list projects with ADC"
            exit 1
          fi
          echo "firebase-tools sees ADC auth OK"

      - name: Deploy Firebase database rules and hosting
        if: github.ref == 'refs/heads/main'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          npx --yes firebase-tools@15.22.1 deploy \
            --config firebase.json \
            --only hosting,database \
            --project loci-flow \
            --non-interactive
