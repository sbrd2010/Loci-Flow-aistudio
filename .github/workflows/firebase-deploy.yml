name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: firebase-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install, test, and build web
        working-directory: web
        env:
          VITE_GROQ_KEY: ${{ secrets.VITE_GROQ_KEY }}
          VITE_NVIDIA_KEY: ${{ secrets.VITE_NVIDIA_KEY }}
          VITE_GEMINI_KEY: ${{ secrets.VITE_GEMINI_KEY }}
          VITE_CEREBRAS_KEY: ${{ secrets.VITE_CEREBRAS_KEY }}
          VITE_ZAI_KEY: ${{ secrets.VITE_ZAI_KEY }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        run: |
          npm ci --legacy-peer-deps
          npm test
          npm run build

      - name: Write Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_LOCI_FLOW: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LOCI_FLOW }}
        run: |
          umask 077
          test -n "$FIREBASE_SERVICE_ACCOUNT_LOCI_FLOW"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_LOCI_FLOW" > "$RUNNER_TEMP/firebase-service-account.json"
          jq -e '
            .type == "service_account" and
            .project_id == "loci-flow" and
            (.private_key | type == "string" and length > 0) and
            (.client_email | type == "string" and length > 0)
          ' "$RUNNER_TEMP/firebase-service-account.json" > /dev/null

      - name: Validate deploy script syntax
        run: |
          node --check scripts/deploy-database-rules-rest.mjs
          node --check scripts/deploy-hosting-rest.mjs

      - name: Authenticate to Google Cloud
        if: github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LOCI_FLOW }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Deploy database rules via REST
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          export FIREBASE_ACCESS_TOKEN="$(gcloud auth print-access-token)"
          node scripts/deploy-database-rules-rest.mjs

      # firebase-tools (both the direct CLI and the internal CLI used by
      # FirebaseExtended/action-hosting-deploy) has repeatedly failed to
      # authenticate with this service account across PRs #298-#304 - the
      # failure point varies (release creation, OAuth token fetch) but the
      # generic "Failed to authenticate" error recurs. The same
      # gcloud-issued access token is accepted directly by the Firebase
      # Hosting REST API, so this deploys Hosting via that API instead of
      # going through firebase-tools at all.
      - name: Deploy Hosting via Firebase Hosting REST API
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          export FIREBASE_ACCESS_TOKEN="$(gcloud auth print-access-token)"
          node scripts/deploy-hosting-rest.mjs
