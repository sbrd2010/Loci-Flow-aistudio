name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FIREBASE_TOOLS_VERSION: 14.26.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install, test, and build web
        working-directory: web
        env:
          VITE_GROQ_KEY: ${{ secrets.VITE_GROQ_KEY }}
          VITE_NVIDIA_KEY: ${{ secrets.VITE_NVIDIA_KEY }}
          VITE_GEMINI_KEY: ${{ secrets.VITE_GEMINI_KEY }}
          VITE_CEREBRAS_KEY: ${{ secrets.VITE_CEREBRAS_KEY }}
          VITE_ZAI_KEY: ${{ secrets.VITE_ZAI_KEY }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        run: |
          npm ci
          npm test
          npm run build

      - name: Write Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_LOCI_FLOW: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LOCI_FLOW }}
        run: |
          umask 077
          test -n "$FIREBASE_SERVICE_ACCOUNT_LOCI_FLOW"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_LOCI_FLOW" > "$RUNNER_TEMP/firebase-service-account.json"
          jq -e '
            .type == "service_account" and
            .project_id == "loci-flow" and
            (.private_key | type == "string" and length > 0) and
            (.client_email | type == "string" and length > 0)
          ' "$RUNNER_TEMP/firebase-service-account.json" > /dev/null

      - name: Diagnose service account auth
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          set -euo pipefail
          jq -r '.private_key' "$GOOGLE_APPLICATION_CREDENTIALS" | openssl pkey -noout -check \
            && echo "PEM parses OK as a private key" \
            || echo "PEM FAILED to parse as a private key"
          gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"
          gcloud auth list
          gcloud config set project loci-flow
          if ! gcloud auth print-access-token > /dev/null; then
            echo "Token retrieval FAILED"
            exit 1
          fi
          echo "Token obtained OK"
          gcloud auth application-default print-access-token > /dev/null \
            && echo "ADC token obtained OK (informational only)" \
            || echo "ADC token retrieval FAILED (informational only)"

          ACCESS_TOKEN=$(gcloud auth print-access-token)

          echo "Calling Firebase Management API project lookup..."
          PROJECT_STATUS=$(curl -s -o "$RUNNER_TEMP/project_response.json" -w '%{http_code}' \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://firebase.googleapis.com/v1beta1/projects/loci-flow")
          echo "Firebase Management API project lookup HTTP status: $PROJECT_STATUS"
          jq -c '{projectId: .projectId, displayName: .displayName, state: .state, errorStatus: .error.status, errorCode: .error.code}' \
            "$RUNNER_TEMP/project_response.json" 2>/dev/null \
            || echo "(could not parse Firebase Management API response as JSON)"

          echo "Calling Firebase Hosting sites list..."
          SITES_STATUS=$(curl -s -o "$RUNNER_TEMP/sites_response.json" -w '%{http_code}' \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://firebasehosting.googleapis.com/v1beta1/projects/loci-flow/sites")
          echo "Firebase Hosting sites list HTTP status: $SITES_STATUS"
          jq -c '{sitesCount: (.sites | length), errorStatus: .error.status, errorCode: .error.code}' \
            "$RUNNER_TEMP/sites_response.json" 2>/dev/null \
            || echo "(could not parse Firebase Hosting API response as JSON)"

          unset ACCESS_TOKEN

          set +e
          PROJECTS_LIST_OUTPUT=$(npx --yes firebase-tools@$FIREBASE_TOOLS_VERSION projects:list --project loci-flow --non-interactive 2>&1)
          PROJECTS_LIST_STATUS=$?
          set -e
          if [ "$PROJECTS_LIST_STATUS" -eq 0 ]; then
            echo "firebase-tools sees ADC auth OK (informational only)"
          else
            echo "firebase-tools projects:list FAILED (informational only; may be a project-list permission scope mismatch, not necessarily a deploy blocker). Error output (filtered):"
            FILTERED_OUTPUT=$(echo "$PROJECTS_LIST_OUTPUT" | grep -v -iE 'BEGIN|PRIVATE KEY|-----|token|Bearer|Authorization|ya29\.|eyJ|client_email|private_key|refresh_token|access_token' || true)
            if [ -n "$FILTERED_OUTPUT" ]; then
              echo "$FILTERED_OUTPUT" | tail -20
            else
              echo "(all firebase-tools output was redacted or empty)"
            fi
          fi

      - name: Authenticate via google-github-actions/auth (experiment)
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LOCI_FLOW }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Diagnose auth via google-github-actions/auth credentials
        run: |
          set -euo pipefail
          gcloud auth list
          if ! gcloud auth print-access-token > /dev/null; then
            echo "Token retrieval via google-github-actions/auth FAILED"
            exit 1
          fi
          echo "Token obtained OK via google-github-actions/auth"
          set +e
          AUTH_ACTION_OUTPUT=$(npx --yes firebase-tools@15.22.2 projects:list --project loci-flow --non-interactive 2>&1)
          AUTH_ACTION_STATUS=$?
          set -e
          if [ "$AUTH_ACTION_STATUS" -eq 0 ]; then
            echo "firebase-tools (via google-github-actions/auth credentials) sees auth OK"
          else
            echo "firebase-tools (via google-github-actions/auth credentials) projects:list FAILED. Error output (filtered):"
            FILTERED_AUTH_ACTION_OUTPUT=$(echo "$AUTH_ACTION_OUTPUT" | grep -v -iE 'BEGIN|PRIVATE KEY|-----|token|Bearer|Authorization|ya29\.|eyJ|client_email|private_key|refresh_token|access_token' || true)
            if [ -n "$FILTERED_AUTH_ACTION_OUTPUT" ]; then
              echo "$FILTERED_AUTH_ACTION_OUTPUT" | tail -20
            else
              echo "(all firebase-tools output was redacted or empty)"
            fi
          fi

      - name: Deploy Firebase database rules and hosting
        if: github.ref == 'refs/heads/main'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          npx --yes firebase-tools@$FIREBASE_TOOLS_VERSION deploy \
            --config firebase.json \
            --only hosting,database \
            --project loci-flow \
            --non-interactive
